name: Installer test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.editorconfig'

jobs:
  test:
    name: "Test on ${{ matrix.os }} (Docker)"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install bashunit
      run: |
        curl -s https://bashunit.typeddevs.com/install.sh | bash

    - name: Run the common tests
      env:
        SCRIPT_FILE: 'start-local.sh'
        TEST_CONTAINER_CLI: docker
      run: |
        ./lib/bashunit

    - name: Run the docker-specific tests
      env:
        SCRIPT_FILE: 'start-local.sh'
        TEST_CONTAINER_CLI: docker
      run: |
        ./lib/bashunit test tests/docker/*

  test-podman:
    name: "Test on ${{ matrix.os }} (Podman)"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install bashunit
      run: |
        curl -s https://bashunit.typeddevs.com/install.sh | bash
   
    - name: Set up Podman
      run: |
        sudo snap remove docker
        sudo apt-get remove -y docker docker-engine docker.io containerd runc docker-ce docker-ce-cli
        sudo apt-get -y install podman

    - name: Restore Podman image cache
      id: podman-cache
      uses: actions/cache@v4
      with:
        path: /tmp/podman-image-cache
        key: podman-images-${{ matrix.os }}-${{ hashFiles('start-local-podman.sh') }}
        restore-keys: |
          podman-images-${{ matrix.os }}-

    - name: Load cached Podman images
      run: |
        if ls /tmp/podman-image-cache/*.tar 2>/dev/null; then
          for img in /tmp/podman-image-cache/*.tar; do
            echo "Loading $img ..."
            podman load -i "$img" || true
          done
        else
          echo "No cached images found."
        fi

    - name: Run the tests
      env:
        SCRIPT_FILE: 'start-local-podman.sh'
        TEST_CONTAINER_CLI: podman
      run: |
        ./lib/bashunit

    - name: Dump start.sh debug log
      # Runs even on cancellation so we always see what start.sh did up to the
      # point of the hang.  The file is written by the _log() helper inside the
      # generated start.sh, bypassing bashunit's subprocess stdout capture.
      if: always()
      run: |
        echo "=== /tmp/start-local-debug.log ==="
        cat /tmp/start-local-debug.log 2>/dev/null || echo "(file not found — start.sh was never called)"

    - name: Save Podman images to cache
      if: always()
      run: |
        mkdir -p /tmp/podman-image-cache
        podman images --format '{{.Repository}}:{{.Tag}}' \
          | grep -v '<none>' \
          | while IFS= read -r img; do
              safe_name=$(echo "$img" | tr '/:.@' '____')
              target="/tmp/podman-image-cache/${safe_name}.tar"
              if [ ! -f "$target" ]; then
                echo "Saving $img -> $target"
                podman save -o "$target" "$img" || true
              fi
            done
